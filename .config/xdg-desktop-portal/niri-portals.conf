# User override of /usr/share/xdg-desktop-portal/niri-portals.conf.
# niri exposes screencast via the GNOME Mutter.ScreenCast interface, so
# xdg-desktop-portal-gnome is the recommended backend (installed via
# home-bootstrap). The gnome FileChooser would pull in nautilus, so keep
# the gtk file chooser instead.
[preferred]
default=gnome;gtk;
org.freedesktop.impl.portal.Access=gtk;
org.freedesktop.impl.portal.Notification=gtk;
org.freedesktop.impl.portal.Secret=gnome-keyring;
org.freedesktop.impl.portal.FileChooser=gtk;
