"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
command_timeout = 800   # ms; keep the prompt snappy even in slow dirs
scan_timeout = 30

palette = "noctalia"

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
${custom.git_describe}\
$nix_shell\
$direnv\
$container\
$docker_context\
$kubernetes\
$line_break\
$character"""

# Keep the typing line clean: timing + jobs + clock float to the right edge.
right_format = """$cmd_duration$jobs$time"""

[palettes.carbonfox]
fg     = '#f2f4f8'
grey   = '#6b6b6b'
red    = '#ee5396'
green  = '#42be65'
yellow = '#3ddbd9'
blue   = '#33b1ff'
purple = '#be95ff'
cyan   = '#82cfff'
orange = '#ff7eb6'

[character]
success_symbol = '[❯](bold green)'
error_symbol   = '[❯](bold red)'
vicmd_symbol   = '[❮](bold blue)'   # shows when you hit Esc in vi-mode

# username surfaces only when it's not "you": root, or a different user over SSH.
[username]
show_always = false
style_user = 'bold yellow'
style_root = 'bold red'
format = '[$user]($style)@'

# Shows the box you're on. ssh_only keeps it invisible on your local machine and
# only surfaces once you're SSH'd somewhere — exactly when you want the reminder.
[hostname]
ssh_only = true
style = 'bold green'
format = '[$hostname]($style) '

# Surfaces only when you're inside a container (toolbox/distrobox/docker/podman).
# Empty on the host, so it can't clutter your normal prompt.
[container]
symbol = ' '
style = 'red dimmed'
format = '[$symbol\[$name\]]($style) '

# direnv is disabled by default; enabling it. It only prints when an `.envrc`
# is in scope, showing whether it's loaded + allowed — nothing when there's none.
[direnv]
disabled = false
symbol = ' '
style = 'yellow'
format = '[$symbol$loaded/$allowed]($style) '
allowed_msg = 'allowed'
not_allowed_msg = 'not-allowed'
denied_msg = 'denied'
loaded_msg = 'on'
unloaded_msg = 'off'

# Renders only inside a `nix-shell` / `nix develop`. Invisible otherwise.
[nix_shell]
disabled = false
symbol = ' '
style = 'blue'
format = '[$symbol$state( \($name\))]($style) '

[directory]
style = 'bold blue'
truncation_length = 3
truncation_symbol = '…/'
read_only = ' '
read_only_style = 'red'
home_symbol = '~'

[git_branch]
symbol = ' '
style = 'bold purple'
format = '[$symbol$branch]($style) '

[git_status]
style = 'red'
format = '([$all_status$ahead_behind]($style) )'
conflicted = '=${count} '
ahead      = '⇡${count} '
behind     = '⇣${count} '
diverged   = '⇕⇡${ahead_count}⇣${behind_count} '
untracked  = '?${count} '
stashed    = '≡${count} '
modified   = '!${count} '
staged     = '+${count} '
renamed    = '»${count} '
deleted    = '✘${count} '

[git_state]
style = 'bold yellow'
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[cmd_duration]
min_time = 2000
style = 'yellow'
format = '[ $duration]($style)'

# Shows only when a docker context is active (compose/Dockerfile present or
# DOCKER_HOST set) and it isn't the plain "default" context.
[docker_context]
symbol = ' '
style = 'blue'
format = '[$symbol$context]($style) '

# Deliberately scoped: only surfaces inside dirs that look like k8s work,
# so your prompt isn't cluttered by a stray kubectl context everywhere.
[kubernetes]
disabled = false
symbol = '☸ '
style = 'cyan'
format = '[$symbol$context( \($namespace\))]($style) '
detect_files = ['k8s', 'Chart.yaml', 'skaffold.yaml']
detect_extensions = []
detect_folders = ['.helm', 'kustomize']

# Right-aligned clock. Nerd-font clock glyph + 24h time.
[time]
disabled = false
style = 'grey'
format = '[ $time]($style)'
time_format = '%H:%M'

# git-describe: nearest tag + commits-since + short hash + dirty flag,
# e.g. "devoker-v0.3.6-4-gabc123". This replaces the runtime-version modules.
[custom.git_describe]
when = 'git rev-parse --is-inside-work-tree'
command = 'git describe --tags --always --dirty 2>/dev/null'
description = 'git describe of the current repo'
symbol = ' '
style = 'cyan'
format = '[$symbol$output]($style) '

[jobs]
symbol = ' '
style = 'purple'
format = '[$symbol$number]($style) '

